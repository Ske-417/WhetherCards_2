<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>トランプ風お天気</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="top-bar">
      <button id="openSettings" class="icon-btn" aria-label="設定">⚙️</button>
      <div id="dateLabel" class="date-label"></div>
      <button id="openHelp" class="icon-btn" aria-label="ヘルプ">❓</button>
    </header>

    <main>
      <section id="offlineBadge" class="offline-badge hidden" aria-live="polite">OFFLINE</section>

      <section id="field" class="field" aria-label="カードフィールド">
        <div id="stack" class="stack"></div>
      </section>

      <button id="refreshBtn" class="refresh-btn" aria-label="更新" title="更新">
        <span class="refresh-icon">↻</span>
      </button>

      <section id="errorPanel" class="error-panel hidden">
        <p id="errorMessage"></p>
        <button id="retryBtn">再試行</button>
      </section>
    </main>

    <div id="overlay" class="overlay hidden" role="dialog" aria-modal="true">
      <p id="encourageText"></p>
    </div>

    <dialog id="settingsDialog">
      <h2>設定</h2>
      <label for="unitSelect">温度単位</label>
      <select id="unitSelect">
        <option value="C">摂氏 (°C)</option>
        <option value="F">華氏 (°F)</option>
        <option value="K">絶対温度 (K)</option>
      </select>

      <label for="fontScale">文字サイズ</label>
      <input id="fontScale" type="range" min="1" max="1.4" step="0.1" />

      <div class="manual-location">
        <label for="manualLocation">位置（地名）</label>
        <input id="manualLocation" type="text" placeholder="例: Tokyo" />
        <button id="searchLocation">検索</button>
        <ul id="locationCandidates"></ul>
      </div>

      <button id="clearData">データ削除</button>
      <button id="closeSettings">閉じる</button>
    </dialog>

    <dialog id="helpDialog">
      <h2>ヘルプ</h2>
      <p>トランプ風のカードを右上にスワイプして3時間分の天気を確認します。</p>
      <ul>
        <li>Q: 更新はいつできる？ A: 1分に1回までです。</li>
        <li>Q: オフライン時は？ A: 最後に取得した3時間分を表示します。</li>
        <li>Q: 位置情報拒否時は？ A: 設定画面から手動入力できます。</li>
      </ul>
      <button id="closeHelp">閉じる</button>
    </dialog>

    <script src="app.js" type="module"></script>
  </body>
</html>
